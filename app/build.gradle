plugins {
    id 'com.android.application'
}

android {
    namespace 'com.tolollauncher'
    compileSdk 33
    defaultConfig {
        applicationId "com.tolollauncher"
        minSdk 26
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
}
