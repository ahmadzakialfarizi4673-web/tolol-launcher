name: Minecraft Server

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  minecraft:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # batas keras GitHub Actions 360 menit (6 jam), kita kasih buffer

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install dependencies (screen)
        run: sudo apt-get update -y && sudo apt-get install -y screen

      - name: Prepare server folder
        run: |
          mkdir -p server
          cd server
          if [ ! -f server.jar ]; then
            echo "Mengambil build terbaru Paper..."
            BUILD=$(curl -s "https://api.papermc.io/v2/projects/paper/versions/1.21.1" \
              | grep -o '"builds":\[[0-9,]*\]' | grep -o '[0-9]*' | tail -1)
            curl -fSL -o server.jar \
              "https://api.papermc.io/v2/projects/paper/versions/1.21.1/builds/${BUILD}/downloads/paper-1.21.1-${BUILD}.jar"
          fi
          echo "eula=true" > eula.txt

      - name: Restore world dari backup sebelumnya (kalau ada)
        run: |
          if [ -d world-backup ]; then
            echo "Restoring world dari backup..."
            cp -r world-backup/world server/ 2>/dev/null || true
            cp -r world-backup/world_nether server/ 2>/dev/null || true
            cp -r world-backup/world_the_end server/ 2>/dev/null || true
          else
            echo "Tidak ada backup, mulai world baru."
          fi

      - name: Install playit.gg
        run: curl -SsL https://playit.gg/install.sh | bash

      - name: Jalankan tunnel playit.gg (background)
        run: |
          nohup playit --secret "${{ secrets.PLAYIT_SECRET }}" > playit.log 2>&1 &
          sleep 15
          echo "----- playit.gg log -----"
          cat playit.log

      - name: Start Minecraft server (background via screen)
        run: |
          cd server
          screen -dmS mcserver bash -c 'java -Xmx6G -Xms2G -jar server.jar nogui'
          sleep 30
          screen -ls
          echo "Server starting, cek tab logs kalau mau lihat progress."

      - name: Keep alive + backup world tiap 5 menit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in $(seq 1 60); do
            sleep 300
            echo "=== Backup ke-$i ==="
            mkdir -p world-backup
            cp -r server/world world-backup/ 2>/dev/null || true
            cp -r server/world_nether world-backup/ 2>/dev/null || true
            cp -r server/world_the_end world-backup/ 2>/dev/null || true
            git add world-backup
            git commit -m "Auto-backup world [skip ci]" --quiet || echo "Tidak ada perubahan."
            git push --quiet || echo "Push gagal, lanjut..."
          done

      - name: Stop server & backup terakhir
        if: always()
        run: |
          echo "Menghentikan server secara graceful..."
          screen -S mcserver -X stuff "stop$(printf '\r')" || true
          sleep 20

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p world-backup
          cp -r server/world world-backup/ 2>/dev/null || true
          cp -r server/world_nether world-backup/ 2>/dev/null || true
          cp -r server/world_the_end world-backup/ 2>/dev/null || true
          git add world-backup
          git commit -m "Final world backup [skip ci]" --quiet || echo "Tidak ada perubahan."
          git push --quiet || echo "Push gagal."
